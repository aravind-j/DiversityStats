template:
  bootstrap: 5
  light-switch: yes
  math-rendering: mathjax
  bslib:
    bootswatch: simplex
    pkgdown-nav-height: 100px
  includes:
    in_header: |
       <!-- Global site tag (gtag.js) - Google Analytics -->
       <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6H0HGPP5G" ></script>
       <script>
         window.dataLayer = window.dataLayer || [];
         function gtag(){dataLayer.push(arguments);}
         gtag('js', new Date());

         gtag('config', 'G-E6H0HGPP5G');
       </script>
       <!-- Google tag (gtag.js) -->
    after_body: >
      <script data-goatcounter="https://diversitystats.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

deploy:
  install_metadata: yes

url: https://aravind-j.github.io/DiversityStats/

navbar:
  structure:
    left:
    - home
    - reference
    - news
    right:
    - search
    - github
    - lightswitch
  components:
    home:
      icon: fa-home fa-lg
      text: Home
      href: index.html
    reference:
      icon: fa-code
      text: Reference
      href: reference/index.html
    tutorial:
      icon: far fa-file
      text: Tutorial
      href: articles/index.html
    github:
      icon: fab fa-github-alt
      text: Github
      href: https://github.com/aravind-j/DiversityStats

search:
  exclude: news/index.html
reference:
- title: Computation of Diversity Measures
  contents: '`diversity.calc`'
  contents: '`berger_parker`'
- title: Comparison of Diversity Measures
  contents:
  - '`diversity.compare`'
  - '`perm.test.global`'
  - '`bootstrap.ci`'
  - '`diversity.profile`'

